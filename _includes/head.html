<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="content-language" content="en">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <script>
    /* Set the theme before first paint (no flash of the wrong theme): a stored
       choice wins, otherwise follow the OS via prefers-color-scheme. */
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>

  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  {% if site.author %}<meta name="author" content="{{ site.author }}">{% endif %}
  <meta name="theme-color" content="#214D72">
  <!-- Self-hosted fonts (Inter, JetBrains Mono, Material Icons) — no Google Fonts (spec §1). -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/fonts.css">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}">
  <meta name="lang:clipboard.copy" content="Copy to clipboard">      
  <meta name="lang:clipboard.copied" content="Copied to clipboard">
  <meta name="lang:search.language" content="en">
  <meta name="lang:search.pipeline.stopwords" content="True">
  <meta name="lang:search.pipeline.trimmer" content="True">
  <meta name="lang:search.result.none" content="No matching documents">
  <meta name="lang:search.result.one" content="1 matching document">
  <meta name="lang:search.result.other" content="# matching documents">
  <meta name="lang:search.tokenizer" content="[\s\-]+">  
  <script src="{{ site.baseurl }}/assets/js/modernizr.74668098.js"></script>
  <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/assets/img/octocat.svg">
  <link rel="shortcut icon" href="{{ site.baseurl }}/assets/img/octocat.svg">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/palette.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/custom.css">
  <script src="{{ site.baseurl }}/assets/js/copy.js" defer></script>
  <script src="{{ site.baseurl }}/assets/js/theme.js" defer></script>
  <!-- Privacy-friendly, self-hosted analytics: no cookies, no cross-site tracking, no personal data. -->
  <script defer data-domain="michalaferber.github.io" src="https://plausible.thompsonblack.us/js/script.js"></script>
