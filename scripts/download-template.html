<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} — Cheatsheet</title>
<style>
/* Self-hosted fonts served from the cheatsheets site — no Google Fonts (spec §1).
   Absolute URLs so a downloaded file still gets the real faces online; offline it
   falls back to the system stack. */
@font-face{font-family:"Inter";font-weight:400;font-display:swap;src:url("https://michalaferber.github.io/cheatsheets/assets/fonts/inter-400.woff2") format("woff2")}
@font-face{font-family:"Inter";font-weight:500;font-display:swap;src:url("https://michalaferber.github.io/cheatsheets/assets/fonts/inter-500.woff2") format("woff2")}
@font-face{font-family:"Inter";font-weight:600;font-display:swap;src:url("https://michalaferber.github.io/cheatsheets/assets/fonts/inter-600.woff2") format("woff2")}
@font-face{font-family:"Inter";font-weight:700;font-display:swap;src:url("https://michalaferber.github.io/cheatsheets/assets/fonts/inter-700.woff2") format("woff2")}
@font-face{font-family:"JetBrains Mono";font-weight:400;font-display:swap;src:url("https://michalaferber.github.io/cheatsheets/assets/fonts/jetbrains-mono-400.woff2") format("woff2")}
@font-face{font-family:"JetBrains Mono";font-weight:500;font-display:swap;src:url("https://michalaferber.github.io/cheatsheets/assets/fonts/jetbrains-mono-500.woff2") format("woff2")}
@font-face{font-family:"JetBrains Mono";font-weight:700;font-display:swap;src:url("https://michalaferber.github.io/cheatsheets/assets/fonts/jetbrains-mono-700.woff2") format("woff2")}
:root{
  --ink:#00070A;      /* Midnight Moss  */
  --blue:#214D72;     /* Chathams Blue  */
  --sepia:#98643F;    /* Sepia Skin     */
  --body:#404040;     /* Cape Cod       */
  --rule:#e1e4e8;
  --code-bg:#eceff4;
  --pre-bg:#f6f8fa;
}
*{box-sizing:border-box}
html{font-size:16px}
body{
  margin:0;
  font-family:"Inter","Roboto",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  line-height:1.7;
  color:var(--body);
  background:#CCCCCC;
}
.page{
  max-width:820px;
  margin:2rem auto;
  padding:3rem 3.25rem 2rem;
  background:#fff;
  border-radius:6px;
  border-bottom:3px solid var(--blue);
  box-shadow:0 1px 4px rgba(0,0,0,.12);
}
h1,h2,h3,h4{font-family:"JetBrains Mono",ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;letter-spacing:-.02em;line-height:1.3;margin:1.8em 0 .6em}
h1{color:var(--ink);font-weight:700;font-size:2.05rem;margin-top:0}
h2{color:var(--blue);font-weight:700;font-size:1.45rem;padding-bottom:.3rem;border-bottom:1px solid var(--rule)}
h3{color:var(--ink);font-weight:700;font-size:1.18rem}
h4{color:var(--ink);font-weight:700;font-size:1.02rem}
p,li{color:var(--body)}
a{color:var(--blue);text-decoration:none}
a:hover{color:var(--sepia);text-decoration:underline}
strong{color:var(--ink)}
hr{border:0;border-top:1px solid var(--rule);margin:2rem 0}
ul,ol{padding-left:1.4rem}
li{margin:.25em 0}
code,kbd,pre{font-family:"JetBrains Mono",ui-monospace,"SFMono-Regular",Menlo,Consolas,"Roboto Mono",monospace}
code{
  font-size:.88em;color:#24292f;background:var(--code-bg);
  padding:.12em .4em;border-radius:4px;
}
pre{
  background:var(--pre-bg);
  border:1px solid var(--rule);
  border-radius:8px;
  padding:1rem 1.15rem;
  overflow:auto;
  line-height:1.55;
}
pre code{font-size:.86em;color:#24292f;background:transparent;padding:0;border-radius:0}
table{border-collapse:collapse;width:100%;margin:1.2rem 0;font-size:.95em}
th,td{padding:.55rem .9rem;border:1px solid var(--rule);text-align:left;vertical-align:top}
th{background:#f3f5f8;color:var(--ink);font-weight:600}
td code{font-weight:500;color:#0d1117;background:#f3f5f8}
blockquote{
  margin:1.2rem 0;padding:.4rem 1.1rem;
  border-left:4px solid var(--blue);
  background:#f6f8fa;color:#4a5568;
}
img{max-width:100%}

.hljs{color:#24292f;background:transparent}
.hljs-doctag,.hljs-keyword,.hljs-meta .hljs-keyword,.hljs-template-tag,.hljs-template-variable,.hljs-type,.hljs-variable.language_{color:#cf222e}
.hljs-title,.hljs-title.class_,.hljs-title.class_.inherited__,.hljs-title.function_{color:#8250df}
.hljs-attr,.hljs-attribute,.hljs-literal,.hljs-meta,.hljs-number,.hljs-operator,.hljs-variable,.hljs-selector-attr,.hljs-selector-class,.hljs-selector-id{color:#0550ae}
.hljs-regexp,.hljs-string,.hljs-meta .hljs-string{color:#0a3069}
.hljs-built_in,.hljs-symbol{color:#e36209}
.hljs-comment,.hljs-code,.hljs-formula{color:#6e7781}
.hljs-name,.hljs-quote,.hljs-selector-tag,.hljs-selector-pseudo{color:#116329}
.hljs-subst{color:#24292f}
.hljs-section{color:#0550ae;font-weight:700}
.hljs-bullet{color:#735c0f}
.hljs-emphasis{color:#24292f;font-style:italic}
.hljs-strong{color:#24292f;font-weight:700}
.hljs-addition{color:#116329;background:#dafbe1}
.hljs-deletion{color:#82071e;background:#ffebe9}

@media print{
  html{font-size:12.5px}
  body{background:#fff}
  .page{max-width:none;margin:0;padding:0;border-radius:0;border-bottom:0;box-shadow:none}
  h2,h3,h4{break-after:avoid}
  pre,table,blockquote{break-inside:avoid}
  a{color:var(--blue)}
}
</style>
</head>
<body>
<main class="page">
{{CONTENT}}</main>
</body>
</html>
