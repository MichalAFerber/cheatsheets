title: "Cheatsheets"
description: "Clean, privacy-first developer cheatsheets — as a web page, PDF, or Markdown."
url: "https://michalaferber.github.io"
baseurl: "/cheatsheets"

# mkdocs-style Jekyll theme (light, mobile-first, sidebar nav + search)
remote_theme: vsoch/mkdocs-jekyll

# --- Theme appearance (light) ---
# The theme wires its custom colour (site.color) to the "red" palette slot,
# so themeColor/accentColor: red = "use the hex in `color` below". This one value
# drives the header, links, and the go-to-top button.
color: "#214D72"        # Chathams Blue (palette primary)
accentColor: red
themeColor: red
fixedNav: "true"
permalinkStyle: false

# --- Repo / edit links ---
github_user: MichalAFerber
github_repo: cheatsheets
repo: "https://github.com/MichalAFerber/cheatsheets"
author: "Michal Ferber"

# --- Content collection ---
collections:
  docs:
    output: true
    permalink: /docs/:path/

# Only docs collection pages get the `page` layout. index.md sets its own layout
# in front matter. The raw .md files under assets/downloads/ have no front matter,
# so /assets/downloads/<slug>.md is served as verbatim Markdown (the download link);
# any .html Jekyll also emits for them is unreferenced and kept out of search
# (see search/search_index.json).
defaults:
  - scope:
      path: ""
      type: docs
    values:
      layout: page

# --- Markdown ---
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-remote-theme

exclude:
  - site/
  - scripts/
  - content/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - node_modules/
